<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FamilyMart Việt Nam - POS System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50 text-gray-800">

    <nav class="bg-[#0080C0] text-white sticky top-0 z-50 shadow-lg">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-6">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/31/FamilyMart_Logo.svg/1024px-FamilyMart_Logo.svg.png" class="h-10 bg-white p-1 rounded" alt="FamilyMart">
                <div class="hidden lg:flex space-x-6 font-bold uppercase text-xs">
                    <a href="#products" class="hover:text-green-300">Sản phẩm</a>
                    <a href="#stores" class="hover:text-green-300">Cửa hàng</a>
                    <a href="#recruitment" class="hover:text-green-300">Tuyển dụng</a>
                </div>
            </div>
            <div id="authArea">
                <button onclick="openModal('loginModal')" class="bg-white text-[#0080C0] px-5 py-1.5 rounded-full font-bold shadow-md hover:bg-gray-100 transition">
                    ĐĂNG NHẬP <i class="fa fa-user-lock ml-1"></i>
                </button>
            </div>
        </div>
    </nav>

    <section id="products" class="container mx-auto py-16 px-4">
        <div class="text-center mb-12">
            <h2 class="text-4xl font-black text-[#00AB4E] mb-2 uppercase italic">Thực đơn đặc sắc</h2>
            <div class="h-1.5 w-24 bg-[#00AB4E] mx-auto rounded-full"></div>
        </div>
        <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            </div>
    </section>

    <div id="detailModal" class="fixed inset-0 bg-black/70 hidden z-[110] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-3xl w-full max-w-lg overflow-hidden shadow-2xl relative">
            <button onclick="closeModal('detailModal')" class="absolute top-4 right-4 text-gray-400 hover:text-red-500 text-2xl">×</button>
            <div id="detailContent" class="p-8">
                </div>
        </div>
    </div>

    <section id="stores" class="bg-white py-16 border-y">
        <div class="container mx-auto px-4 flex flex-col lg:flex-row gap-10">
            <div class="lg:w-1/3">
                <h2 class="text-3xl font-bold text-[#0080C0] mb-6 italic"><i class="fa fa-map-marker-alt"></i> Cửa hàng gần bạn</h2>
                <div class="p-4 border-l-4 border-[#00AB4E] bg-gray-50 rounded-r-xl">
                    <h4 class="font-bold">FamilyMart HUFLIT</h4>
                    <p class="text-sm text-gray-600">828 Sư Vạn Hạnh, P.13, Quận 10, TP.HCM</p>
                </div>
            </div>
            <div class="lg:w-2/3 h-[400px] rounded-2xl overflow-hidden shadow-inner border">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3919.4478792033816!2d106.66442437583842!3d10.77697475918385!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x31752edca3d80991%3A0x2f605029302ba505!2sHUFLIT%20-%20S%C6%B0%20V%E1%BA%A1n%20H%E1%BA%A1nh!5e0!3m2!1svi!2s!4v1710000000000!5m2!1svi!2s" 
                class="w-full h-full" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
            </div>
        </div>
    </section>

    <section id="recruitment" class="container mx-auto py-16 px-4">
        <div class="bg-[#00AB4E] rounded-[3rem] p-10 text-white flex flex-col lg:flex-row items-center gap-10 shadow-xl">
            <div class="lg:w-1/2">
                <h2 class="text-4xl font-black mb-4 italic uppercase">Gia nhập FamilyMart</h2>
                <p class="opacity-90 mb-6">Trở thành thành viên của đội ngũ năng động để mang lại nụ cười cho khách hàng.</p>
            </div>
            <div class="lg:w-1/2 bg-white p-8 rounded-2xl text-gray-800 w-full shadow-lg">
                <h3 class="text-xl font-bold mb-4 text-center text-[#0080C0] uppercase">Đăng ký ứng tuyển</h3>
                <form class="space-y-3">
                    <input type="text" placeholder="Họ và tên" class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-green-500">
                    <div class="grid grid-cols-2 gap-3">
                        <input type="tel" placeholder="Số điện thoại" class="w-full p-3 border rounded-lg">
                        <input type="email" placeholder="Email" class="w-full p-3 border rounded-lg">
                    </div>
                    <select class="w-full p-3 border rounded-lg bg-gray-50 font-bold">
                        <option>Nhân viên bán hàng (Stalk)</option>
                        <option>Cửa hàng trưởng (Manager)</option>
                    </select>
                    <textarea placeholder="Lý do bạn chọn FamilyMart?" class="w-full p-3 border rounded-lg h-20"></textarea>
                    <input type="password" placeholder="Thiết lập mật khẩu" class="w-full p-3 border rounded-lg">
                    <button type="submit" class="w-full bg-[#0080C0] text-white py-3 rounded-lg font-bold hover:bg-blue-800 transition">GỬI HỒ SƠ</button>
                </form>
            </div>
        </div>
    </section>

    <div id="loginModal" class="fixed inset-0 bg-black/60 hidden z-[120] flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-md overflow-hidden shadow-2xl">
            <div class="bg-[#0080C0] p-8 text-white text-center relative">
                <button onclick="closeModal('loginModal')" class="absolute top-4 right-4 text-2xl">×</button>
                <i class="fa fa-id-card text-5xl mb-4"></i>
                <h3 class="text-2xl font-black uppercase italic">Hệ Thống Nội Bộ</h3>
            </div>
            <form class="p-8 space-y-5">
                <input type="email" placeholder="Email nhân viên" class="w-full p-4 border-b-2 focus:border-[#0080C0] outline-none font-medium" required>
                <input type="password" placeholder="Mật khẩu" class="w-full p-4 border-b-2 focus:border-[#0080C0] outline-none font-medium" required>
                <button type="submit" class="w-full bg-[#00AB4E] text-white py-4 rounded-xl font-black shadow-lg hover:bg-green-600 transition uppercase tracking-widest">Đăng nhập</button>
            </form>
        </div>
    </div>

    <script src="js/pos.js"></script>
    <script>
        window.openModal = (id) => document.getElementById(id).classList.remove('hidden');
        window.closeModal = (id) => document.getElementById(id).classList.add('hidden');
    </script>
</body>
</html>
