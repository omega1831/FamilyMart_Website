<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FamilyMart Việt Nam - POS System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .cat-btn.active { background-color: #0080C0 !important; color: white !important; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 h-screen overflow-hidden flex flex-col">

    <nav class="bg-[#0080C0] text-white shadow-md flex-none">
        <div class="px-6 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <button class="text-2xl mr-2"><i class="fa fa-bars"></i></button>
                <div class="relative">
                    <i class="fa fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="text" id="searchInput" onkeyup="handleSearch(this.value)" placeholder="Tìm kiếm sản phẩm..." class="pl-12 pr-4 py-2 w-80 rounded-xl text-gray-700 outline-none shadow-inner bg-gray-50 focus:ring-2 focus:ring-blue-300 transition-all">
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2 bg-white/20 px-4 py-1.5 rounded-full border border-white/30">
                    <i class="fa fa-store text-xs"></i>
                    <span id="currentStoreName" class="font-bold text-sm">Đang tải cửa hàng...</span>
                </div>
                <button onclick="logout()" class="w-10 h-10 bg-white text-[#0080C0] rounded-full flex items-center justify-center shadow-md hover:bg-red-50 hover:text-red-600 transition-colors">
                    <i class="fa fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="flex flex-1 overflow-hidden">
        
        <section class="w-[45%] bg-white flex flex-col border-r shadow-xl z-10">
            <div class="flex-1 overflow-y-auto px-4 py-2">
                <table class="w-full text-left border-collapse">
                    <thead class="sticky top-0 bg-white z-10 border-b-2">
                        <tr class="text-[11px] uppercase font-black text-gray-400 italic">
                            <th class="py-4">Sản phẩm</th> <th class="py-4 text-center">SL</th>
                            <th class="py-4 text-right">Đơn giá</th>
                            <th class="py-4 text-right pr-2">Thành tiền</th>
                        </tr>
                    </thead>
                    <tbody id="cartBody" class="divide-y divide-gray-50 font-medium text-sm">
                        </tbody>
                </table>
                <div id="emptyCart" class="py-20 text-center text-gray-300 italic">Chưa có sản phẩm nào</div>
            </div>

            <div class="p-6 bg-gray-50 border-t space-y-4">
                <div class="grid grid-cols-1 gap-3">
                    <div class="flex items-center bg-white rounded-xl px-4 py-1 ring-1 ring-gray-200">
                        <span class="text-[10px] font-black w-32 text-gray-400 uppercase">Phương thức:</span>
                        <select id="paymentMethod" class="flex-1 p-2 outline-none font-bold text-[#0080C0] bg-transparent cursor-pointer">
                            <option value="TIỀN MẶT">Tiền mặt</option>
                            <option value="VÍ MOMO">Ví MoMo</option>
                            <option value="VNPAY">VNPAY</option>
                            <option value="THẺ NGÂN HÀNG">Thẻ ATM/Visa</option>
                        </select>
                    </div>

                    <div class="flex items-center bg-white rounded-xl px-4 py-1 ring-1 ring-gray-200 focus-within:ring-[#0080C0] transition-all">
                        <span class="text-[10px] font-black w-32 text-gray-400 uppercase">Số tiền trả:</span>
                        <input type="number" id="payAmount" class="flex-1 p-2 outline-none font-black text-blue-700 bg-transparent text-lg" placeholder="Nhập số tiền khách đưa...">
                        
                        <button onclick="confirmPartial()" class="ml-2 bg-blue-100 text-blue-600 w-10 h-10 rounded-xl hover:bg-[#0080C0] hover:text-white transition-all flex items-center justify-center shadow-sm" title="Xác nhận thanh toán phần này">
                            <i class="fa fa-check"></i>
                        </button>
                    </div>
                </div>

                <div class="flex justify-between items-center py-2">
                    <span class="text-xl font-black text-gray-700 italic uppercase">Còn lại:</span>
                    <div class="bg-[#FF3B30] text-white px-8 py-3 rounded-2xl font-black text-3xl shadow-lg shadow-red-100">
                        <span id="totalDisplay">0</span>
                    </div>
                </div>

                <button onclick="processPayment()" id="btnThanhToan" class="w-full bg-[#46c11b] hover:bg-green-600 text-white px-10 py-5 rounded-2xl text-xl font-black shadow-lg transition-all active:scale-95 uppercase flex justify-center items-center gap-3">
                    <i class="fa fa-print"></i> Hoàn tất Thanh Toán
                </button>
            </div>
        </section>

        <section class="w-[55%] flex flex-col bg-gray-100">
            <div id="categoryContainer" class="p-4 bg-white border-b overflow-x-auto flex gap-2 no-scrollbar">
                </div>

            <div id="productGrid" class="flex-1 overflow-y-auto p-6 grid grid-cols-2 xl:grid-cols-4 gap-6 content-start">
                </div>
        </section>
    </main>

    <script src="pos.js"></script>
</body>
</html>
