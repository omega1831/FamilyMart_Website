<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FamilyMart Việt Nam - POS System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-100 text-gray-800 h-screen overflow-hidden flex flex-col">

    <nav class="bg-[#0080C0] text-white shadow-md flex-none">
        <div class="px-6 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <button class="text-2xl mr-2"><i class="fa fa-bars"></i></button>
                <div class="relative">
                    <i class="fa fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="text" id="searchInput" onkeyup="handleSearch(this.value)" placeholder="Tìm kiếm sản phẩm..." class="pl-12 pr-4 py-2 w-80 rounded-xl text-gray-700 outline-none shadow-inner bg-gray-50 focus:ring-2 focus:ring-blue-300 transition-all">
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2 bg-white/20 px-4 py-1.5 rounded-full">
                    <i class="fa fa-store"></i>
                    <span id="currentStoreName" class="font-bold text-sm italic">Đang tải Store...</span>
                </div>
                <button onclick="logout()" class="w-10 h-10 bg-white text-[#0080C0] rounded-full flex items-center justify-center shadow-md hover:bg-red-50 hover:text-red-600 transition-colors">
                    <i class="fa fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="flex flex-1 overflow-hidden">
        
        <section class="w-[45%] bg-white flex flex-col border-r shadow-xl z-10">
            <div class="flex-1 overflow-y-auto px-4 py-2">
                <table class="w-full text-left border-collapse">
                    <thead class="sticky top-0 bg-white z-10 border-b-2">
                        <tr class="text-[11px] uppercase font-black text-gray-400 italic">
                            <th class="py-4">Hàng hóa</th>
                            <th class="py-4 text-center">Size</th> 
                            <th class="py-4 text-center">SL</th>
                            <th class="py-4">ĐVT</th>
                            <th class="py-4 text-right">Đơn giá</th>
                            <th class="py-4 text-right pr-2">Thành tiền</th>
                        </tr>
                    </thead>
                    <tbody id="cartBody" class="divide-y divide-gray-50">
                        </tbody>
                </table>
            </div>

            <div class="p-6 bg-gray-50 border-t space-y-4">
                <div class="grid grid-cols-1 gap-3">
                    <div class="flex items-center bg-white rounded-xl px-4 py-1 ring-1 ring-gray-200 focus-within:ring-[#0080C0] transition-all">
                        <span class="text-xs font-bold w-32 text-gray-500 uppercase">Khách hàng:</span>
                        <input type="text" id="customerName" placeholder="Tên khách hàng..." class="flex-1 p-2 outline-none font-bold text-gray-700 bg-transparent">
                    </div>
                    <div class="flex items-center bg-white rounded-xl px-4 py-1 ring-1 ring-gray-200 focus-within:ring-[#0080C0] transition-all">
                        <span class="text-xs font-bold w-32 text-gray-500 uppercase">SĐT:</span>
                        <input type="tel" id="customerPhone" placeholder="0xxx..." class="flex-1 p-2 outline-none font-bold text-gray-700 bg-transparent">
                    </div>
                    <div class="flex items-center bg-white rounded-xl px-4 py-1 ring-1 ring-gray-200">
                        <span class="text-xs font-bold w-32 text-gray-500 uppercase">Thanh toán:</span>
                        <select id="paymentMethod" class="flex-1 p-2 outline-none font-bold text-[#0080C0] bg-transparent cursor-pointer">
                            <option value="TIỀN MẶT">Tiền mặt</option>
                            <option value="CHUYỂN KHOẢN">Chuyển khoản</option>
                            <option value="VNPAY">VNPAY</option>
                            <option value="MOMO">Ví MoMo</option>
                        </select>
                    </div>
                </div>

                <div class="flex justify-between items-center py-4">
                    <span class="text-2xl font-black text-gray-700 italic uppercase">Tổng cộng:</span>
                    <div class="bg-[#FF3B30] text-white px-8 py-3 rounded-2xl font-black text-3xl shadow-lg shadow-red-100">
                        <span id="totalDisplay">0</span> VNĐ
                    </div>
                </div>

                <button onclick="processPayment()" id="btnThanhToan" class="w-full bg-[#46c11b] hover:bg-green-600 text-white px-10 py-4 rounded-xl text-xl font-black shadow-lg transition-all active:scale-95 uppercase flex justify-center items-center gap-3">
                    <i class="fa fa-check-circle"></i> Xác nhận thanh toán
                </button>
            </div>
        </section>

        <section class="w-[55%] flex flex-col bg-gray-100">
            <div id="categoryContainer" class="p-4 bg-white/50 border-b overflow-x-auto flex gap-2 no-scrollbar">
                <button onclick="filterCategory('all')" class="cat-btn active px-6 py-2.5 rounded-xl font-bold whitespace-nowrap bg-[#0080C0] text-white shadow-md transition-all">Tất cả món</button>
                <button onclick="filterCategory('Đồ Ăn')" class="cat-btn px-6 py-2.5 rounded-xl font-bold whitespace-nowrap bg-white text-gray-600 hover:bg-blue-50 transition-all">Đồ Ăn</button>
                <button onclick="filterCategory('Nước Uống')" class="cat-btn px-6 py-2.5 rounded-xl font-bold whitespace-nowrap bg-white text-gray-600 hover:bg-blue-50 transition-all">Thức uống</button>
                <button onclick="filterCategory('Bánh Kẹo')" class="cat-btn px-6 py-2.5 rounded-xl font-bold whitespace-nowrap bg-white text-gray-600 hover:bg-blue-50 transition-all">Bánh Kẹo</button>
            </div>

            <div id="productGrid" class="flex-1 overflow-y-auto p-6 grid grid-cols-2 xl:grid-cols-4 gap-6 content-start">
                <div class="col-span-full text-center py-20 text-gray-400">
                    <i class="fa fa-spinner fa-spin text-4xl mb-4"></i>
                    <p class="italic">Đang kết nối database FamilyMart...</p>
                </div>
            </div>
        </section>
    </main>

    <div id="detailModal" class="fixed inset-0 bg-black/60 hidden z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-[40px] w-full max-w-lg overflow-hidden shadow-2xl relative animate-pop-in">
            <button onclick="closeModal('detailModal')" class="absolute top-6 right-6 text-gray-300 hover:text-red-500 text-3xl transition-colors">×</button>
            <div id="detailContent" class="p-10">
                </div>
        </div>
    </div>

    <script src="js/pos.js"></script>

    <script>
        // Các hàm điều khiển Modal (Giữ lại từ code cũ của bạn)
        window.openModal = (id) => {
            const modal = document.getElementById(id);
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        };
        window.closeModal = (id) => {
            const modal = document.getElementById(id);
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        };

        // UI: Đổi màu nút Category khi click
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.cat-btn').forEach(b => {
                    b.classList.remove('bg-[#0080C0]', 'text-white', 'shadow-md');
                    b.classList.add('bg-white', 'text-gray-600');
                });
                this.classList.remove('bg-white', 'text-gray-600');
                this.classList.add('bg-[#0080C0]', 'text-white', 'shadow-md');
            });
        });

        // Hàm Logout (Xóa storeId và về login)
        function logout() {
            if(confirm("Bạn muốn đăng xuất và đóng POS?")) {
                localStorage.clear();
                window.location.href = 'login.html';
            }
        }
    </script>

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-pop-in { animation: popIn 0.3s ease-out; }
        @keyframes popIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        /* Hiệu ứng khi hover sản phẩm */
        .product-card:hover { transform: translateY(-5px); }
    </style>
</body>
</html>
