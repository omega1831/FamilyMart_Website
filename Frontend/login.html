<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập Hệ thống - FamilyMart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --fm-blue: #0080C0; --fm-green: #00AB4E; }
        .bg-fm-blue { background-color: var(--fm-blue); }
        .text-fm-blue { color: var(--fm-blue); }
        .bg-fm-green { background-color: var(--fm-green); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden animate-fade-in">
        <div class="bg-fm-blue p-8 text-center text-white relative">
            <a href="index.html" class="absolute top-4 left-4 hover:text-green-300 transition">
                <i class="fa fa-arrow-left"></i>
            </a>
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/31/FamilyMart_Logo.svg/1024px-FamilyMart_Logo.svg.png" 
                 class="h-12 mx-auto bg-white p-2 rounded-lg mb-4" alt="FamilyMart">
            <h2 class="text-2xl font-black uppercase tracking-widest italic">Hệ Thống Nội Bộ</h2>
            <p class="text-xs opacity-80 mt-2">Dành cho Nhân viên & Quản lý</p>
        </div>

        <form id="loginForm" class="p-8 space-y-6">
            <div class="space-y-2">
                <label class="text-xs font-bold text-gray-400 uppercase tracking-widest ml-1">Email nhân viên</label>
                <div class="relative">
                    <i class="fa fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="email" id="email" required
                           class="w-full pl-12 pr-4 py-4 bg-gray-50 border-2 border-transparent focus:border-fm-blue rounded-xl outline-none transition"
                           placeholder="example@familymart.com.vn">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-xs font-bold text-gray-400 uppercase tracking-widest ml-1">Mật khẩu</label>
                <div class="relative">
                    <i class="fa fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="password" id="password" required
                           class="w-full pl-12 pr-4 py-4 bg-gray-50 border-2 border-transparent focus:border-fm-blue rounded-xl outline-none transition"
                           placeholder="••••••••">
                </div>
            </div>

            <button type="submit" 
                    class="w-full bg-fm-green text-white py-4 rounded-xl font-black shadow-lg hover:bg-green-600 transition uppercase tracking-widest active:scale-95">
                Đăng nhập ngay
            </button>
            
            <div id="message" class="text-center text-sm font-bold mt-4 hidden"></div>
        </form>

        <div class="p-6 bg-gray-50 border-t text-center">
            <p class="text-xs text-gray-400">Quên mật khẩu? Vui lòng liên hệ bộ phận IT</p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msgDiv = document.getElementById('message');

            try {
                // CALL API: Frontend -> Backend (ASP.NET) -> Database (Oracle)
                const response = await fetch('https://localhost:5001/api/Auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Lưu thông tin vào Session/LocalStorage
                    sessionStorage.setItem('userToken', data.token);
                    sessionStorage.setItem('userRole', data.role); // 'Manager' hoặc 'Staff'
                    sessionStorage.setItem('userName', data.fullName);

                    msgDiv.className = "text-center text-sm font-bold mt-4 text-green-600";
                    msgDiv.innerText = "Đăng nhập thành công! Đang chuyển hướng...";
                    msgDiv.classList.remove('hidden');

                    // Chuyển hướng dựa trên Role lấy từ Oracle
                    setTimeout(() => {
                        window.location.href = (data.role === 'Manager') ? 'manager.html' : 'index.html';
                    }, 1500);
                } else {
                    msgDiv.className = "text-center text-sm font-bold mt-4 text-red-600";
                    msgDiv.innerText = data.message || "Email hoặc mật khẩu không đúng!";
                    msgDiv.classList.remove('hidden');
                }
            } catch (error) {
                console.error("Lỗi kết nối API:", error);
                alert("Không thể kết nối tới máy chủ Backend!");
            }
        });
    </script>
</body>
</html>
