<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Trị Hệ Thống - FamilyMart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --fm-blue: #0080C0; --fm-green: #00AB4E; }
        .bg-fm-blue { background-color: var(--fm-blue); }
        .bg-fm-green { background-color: var(--fm-green); }
        .sidebar-link:hover { background: rgba(255,255,255,0.1); }
        .active-tab { background: white !important; color: var(--fm-blue) !important; }
    </style>
</head>
<body class="bg-gray-100 flex min-h-screen">

    <aside class="w-64 bg-fm-blue text-white flex flex-col shadow-xl">
        <div class="p-6 text-center border-b border-white/20">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/31/FamilyMart_Logo.svg/1024px-FamilyMart_Logo.svg.png" 
                 class="h-8 mx-auto bg-white p-1 rounded mb-2">
            <p class="text-[10px] font-bold uppercase tracking-widest opacity-70">Quản lý hệ thống</p>
        </div>
        
        <nav class="flex-1 p-4 space-y-2 mt-4">
            <button onclick="switchTab('stalk-tab')" id="stalk-btn" class="sidebar-link w-full flex items-center p-3 rounded-xl transition font-bold active-tab">
                <i class="fa fa-users-cog mr-3"></i> Duyệt Nhân Viên
            </button>
            <button onclick="switchTab('product-tab')" id="product-btn" class="sidebar-link w-full flex items-center p-3 rounded-xl transition font-bold">
                <i class="fa fa-box-open mr-3"></i> Quản Lý Hàng Hóa
            </button>
            <button onclick="switchTab('report-tab')" id="report-btn" class="sidebar-link w-full flex items-center p-3 rounded-xl transition font-bold">
                <i class="fa fa-chart-line mr-3"></i> Báo Cáo Doanh Thu
            </button>
        </nav>

        <div class="p-4 border-t border-white/20">
            <button onclick="logout()" class="w-full flex items-center p-3 text-red-300 font-bold hover:text-white transition">
                <i class="fa fa-sign-out-alt mr-3"></i> Đăng xuất
            </button>
        </div>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 id="tab-title" class="text-2xl font-black text-gray-800 uppercase italic">Duyệt hồ sơ ứng tuyển</h1>
            <div class="flex items-center space-x-4 bg-white p-2 px-4 rounded-2xl shadow-sm">
                <div class="text-right">
                    <p id="manager-name" class="font-bold text-sm">Manager Name</p>
                    <p class="text-[10px] text-fm-green font-bold">Trực tuyến</p>
                </div>
                <div class="w-10 h-10 bg-gray-200 rounded-full flex items-center justify-center text-fm-blue">
                    <i class="fa fa-user-tie"></i>
                </div>
            </div>
        </header>

        <section id="stalk-tab" class="tab-content">
            <div class="bg-white rounded-3xl shadow-sm overflow-hidden border border-gray-100">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 border-b">
                        <tr>
                            <th class="p-4 text-xs font-black uppercase text-gray-400">Ứng viên</th>
                            <th class="p-4 text-xs font-black uppercase text-gray-400">Vị trí</th>
                            <th class="p-4 text-xs font-black uppercase text-gray-400">Lý do</th>
                            <th class="p-4 text-xs font-black uppercase text-gray-400 text-center">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="stalk-list">
                        </tbody>
                </table>
            </div>
        </section>

        <section id="product-tab" class="tab-content hidden text-center py-20">
            <i class="fa fa-tools text-5xl text-gray-200 mb-4"></i>
            <h2 class="text-xl font-bold text-gray-400">Tính năng chỉnh sửa hàng hóa đang kết nối DB...</h2>
        </section>

    </main>

    <script>
        // Kiểm tra quyền truy cập (Manager mới được vào)
        window.onload = () => {
            const role = sessionStorage.getItem('userRole');
            if (role !== 'Manager') {
                alert("Bạn không có quyền truy cập trang này!");
                window.location.href = 'index.html';
            }
            document.getElementById('manager-name').innerText = sessionStorage.getItem('userName') || "Quản lý";
            loadApplicants();
        };

        // Chuyển đổi giữa các Menu
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.querySelectorAll('.sidebar-link').forEach(b => b.classList.remove('active-tab'));
            
            document.getElementById(tabId).classList.remove('hidden');
            event.currentTarget.classList.add('active-tab');
            
            const titles = { 'stalk-tab': 'Duyệt hồ sơ ứng tuyển', 'product-tab': 'Quản lý kho hàng', 'report-tab': 'Báo cáo hệ thống' };
            document.getElementById('tab-title').innerText = titles[tabId];
        }

        // Mô phỏng lấy dữ liệu từ Oracle (Table RECRUITMENT)
        async function loadApplicants() {
            // FE -> BE -> DB Oracle -> BE -> FE
            const mockData = [
                { id: 1, name: "Nguyễn Văn A", email: "vana@gmail.com", phone: "0901234567", role: "Stalk", reason: "Yêu thích môi trường năng động" },
                { id: 2, name: "Trần Thị B", email: "thib@gmail.com", phone: "0988776655", role: "Stalk", reason: "Muốn học hỏi kỹ năng POS" }
            ];

            const list = document.getElementById('stalk-list');
            list.innerHTML = mockData.map(app => `
                <tr class="border-b hover:bg-gray-50 transition">
                    <td class="p-4">
                        <p class="font-bold text-gray-800">${app.name}</p>
                        <p class="text-xs text-gray-400">${app.email} | ${app.phone}</p>
                    </td>
                    <td class="p-4"><span class="bg-blue-100 text-blue-600 px-3 py-1 rounded-full text-[10px] font-black uppercase">${app.role}</span></td>
                    <td class="p-4 text-sm text-gray-500 italic">"${app.reason}"</td>
                    <td class="p-4 text-center space-x-2">
                        <button onclick="approve('${app.id}')" class="bg-fm-green text-white p-2 px-4 rounded-xl text-xs font-bold hover:shadow-lg transition">DUYỆT</button>
                        <button class="bg-red-50 text-red-500 p-2 px-4 rounded-xl text-xs font-bold hover:bg-red-500 hover:text-white transition">LOẠI</button>
                    </td>
                </tr>
            `).join('');
        }

        function approve(id) {
            alert("Đã phê duyệt nhân viên mã số: " + id + ". Tài khoản đã được kích hoạt trong DB Oracle.");
            // Gọi API: fetch('/api/manager/approve/' + id, { method: 'POST' })
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
